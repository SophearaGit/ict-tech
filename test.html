
      
      <div class="flex items-center gap-2">
        <label for="sort-select" class="text-md text-gray-400 whitespace-nowrap">Sort:</label>
        <select
          id="sort-select"
          onchange="sortProducts(this.value)"
          class="text-md bg-white/80 border border-gray-200 rounded-xl px-3 py-1.5 text-gray-700 outline-none cursor-pointer focus:ring-2 focus:ring-indigo-300"
        >
          <option value="default">Featured</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="name">Name A–Z</option>
        </select>
      </div>
      <!-- Price range pills — separate row, NOT inside the <select> -->
      <div class="flex items-center gap-2 flex-wrap" id="price-pills">
        <button data-price="under500" class="price-pill text-sm font-bold px-4 py-2 rounded-full border transition-all duration-200 bg-white/70 text-gray-600 border-gray-200 hover:bg-gray-100 whitespace-nowrap" onclick="setPriceRange('under500')" aria-pressed="false">
          Under $500
        </button>
        <button data-price="500to1000" class="price-pill text-sm font-bold px-4 py-2 rounded-full border transition-all duration-200 bg-white/70 text-gray-600 border-gray-200 hover:bg-gray-100 whitespace-nowrap" onclick="setPriceRange('500to1000')" aria-pressed="false">
          $500 – $1000
        </button>
        <button data-price="above1000" class="price-pill text-sm font-bold px-4 py-2 rounded-full border transition-all duration-200 bg-white/70 text-gray-600 border-gray-200 hover:bg-gray-100 whitespace-nowrap" onclick="setPriceRange('above1000')" aria-pressed="false">
          Above $1000
        </button>
      </div>
