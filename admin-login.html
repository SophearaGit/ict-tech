<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Login — ICT-Tech</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script>tailwind.config={theme:{extend:{fontFamily:{display:['Syne','sans-serif'],body:['Inter','sans-serif']}}}}</script>
<style>
  body{font-family:'Inter',sans-serif;}
  h1,h2,h3{font-family:'Syne',sans-serif;}
  .input-field:focus{outline:none;border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,0.12);}
  .grid-bg{background-image:linear-gradient(rgba(99,102,241,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,0.05) 1px,transparent 1px);background-size:40px 40px;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .card-in{animation:fadeIn 0.45s ease both;}
</style>
</head>
<body class="min-h-screen bg-gray-50 grid-bg flex items-center justify-center px-4">

  <!-- Background blobs -->
  <div class="fixed top-0 left-0 w-96 h-96 bg-indigo-200/20 rounded-full blur-3xl pointer-events-none -translate-x-1/2 -translate-y-1/2"></div>
  <div class="fixed bottom-0 right-0 w-80 h-80 bg-purple-200/20 rounded-full blur-3xl pointer-events-none translate-x-1/2 translate-y-1/2"></div>

  <div class="card-in w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <a href="index.html" class="inline-flex items-center gap-2 mb-4">
        <div class="w-9 h-9 bg-indigo-500 rounded-xl flex items-center justify-center text-white text-lg">👟</div>
        <span class="font-display font-bold text-2xl text-gray-900">Nova<span class="text-indigo-500">Drop</span></span>
      </a>
      <h1 class="font-display font-bold text-2xl text-gray-900">Admin Portal</h1>
      <p class="text-gray-400 text-sm mt-1">Sign in to manage your store</p>
    </div>

    <!-- Card -->
    <div class="bg-white/80 backdrop-blur-md rounded-3xl border border-gray-100 shadow-sm p-8">

      <div id="error-banner" class="hidden bg-red-50 border border-red-100 text-red-600 text-sm rounded-2xl px-4 py-3 mb-5 flex items-center gap-2">
        <svg class="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/></svg>
        <span id="error-text">Invalid credentials. Please try again.</span>
      </div>

      <div class="space-y-5">
        <!-- Username -->
        <div>
          <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1.5">Username</label>
          <div class="relative">
            <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
            <input id="username" type="text" placeholder="admin" autocomplete="username"
              class="input-field w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm text-gray-800 placeholder-gray-400 transition-all"
              onkeydown="if(event.key==='Enter')login()"/>
          </div>
        </div>

        <!-- Password -->
        <div>
          <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1.5">Password</label>
          <div class="relative">
            <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
            </svg>
            <input id="password" type="password" placeholder="••••••••" autocomplete="current-password"
              class="input-field w-full pl-10 pr-10 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm text-gray-800 placeholder-gray-400 transition-all"
              onkeydown="if(event.key==='Enter')login()"/>
            <button onclick="togglePw()" class="absolute right-3.5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors">
              <svg id="pw-eye" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
            </button>
          </div>
        </div>

        <!-- Hint -->
        <div class="bg-indigo-50 border border-indigo-100 rounded-xl px-4 py-3 text-xs text-indigo-600 flex items-start gap-2">
          <svg class="w-3.5 h-3.5 flex-shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"/></svg>
          <span>Demo credentials: <strong>admin</strong> / <strong>admin123</strong></span>
        </div>

        <!-- Submit -->
        <button onclick="login()" id="login-btn"
          class="w-full bg-gray-900 hover:bg-indigo-600 text-white font-semibold py-3.5 rounded-2xl text-sm transition-all duration-200 hover:-translate-y-0.5 hover:shadow-lg active:translate-y-0 flex items-center justify-center gap-2">
          <span id="btn-text">Sign In</span>
          <svg id="btn-spin" class="hidden w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
          </svg>
        </button>
      </div>
    </div>

    <p class="text-center text-xs text-gray-400 mt-5">
      <a href="index.html" class="hover:text-gray-600 transition-colors">← Back to store</a>
    </p>
  </div>

<script>
  // Redirect if already logged in
  if (sessionStorage.getItem('nd_admin') === 'true') {
    window.location.href = 'admin.html';
  }

  const CREDENTIALS = { username: 'admin', password: 'admin123' };

  function togglePw() {
    const inp = document.getElementById('password');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  function login() {
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value;
    const btn = document.getElementById('login-btn');
    const txt = document.getElementById('btn-text');
    const spin = document.getElementById('btn-spin');
    const err = document.getElementById('error-banner');

    err.classList.add('hidden');
    btn.disabled = true;
    txt.textContent = 'Signing in…';
    spin.classList.remove('hidden');

    setTimeout(() => {
      if (u === CREDENTIALS.username && p === CREDENTIALS.password) {
        sessionStorage.setItem('nd_admin', 'true');
        sessionStorage.setItem('nd_admin_user', u);
        window.location.href = 'admin.html';
      } else {
        btn.disabled = false;
        txt.textContent = 'Sign In';
        spin.classList.add('hidden');
        err.classList.remove('hidden');
        document.getElementById('password').value = '';
      }
    }, 900);
  }
</script>
</body>
</html>
